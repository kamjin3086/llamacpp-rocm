name: Build Llama.cpp + ROCm (gfx1151/Ubuntu)
on:
  workflow_dispatch:
    inputs:
      rocm_version:
        description: 'ROCm version (e.g., 7.13.0a20260318) or "latest" to auto-detect'
        required: false
        default: 'latest'
      llamacpp_version:
        description: 'llama.cpp version: "latest"(=master)/PR号(如22673)/标签/分支/commit hash/refs/pull/xxx/head'
        required: false
        default: 'latest'

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04
    outputs:
      rocm_version: ${{ steps.set-outputs.outputs.rocm_version }}
      llamacpp_commit_hash: ${{ steps.set-outputs.outputs.llamacpp_commit_hash }}

    steps:
    - name: Free disk space
      run: curl -fsSL https://raw.githubusercontent.com/kou/arrow/e49d8ae15583ceff03237571569099a6ad62be32/ci/scripts/util_free_space.sh | bash

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake ninja-build unzip curl
        cmake --version
        ninja --version

    - name: Download and extract ROCm
      run: |
        rocm_version="${{ env.ROCM_VERSION }}"
        s3_target="gfx1151"

        # Empty string or "latest" both mean auto-detect
        if [ -z "$rocm_version" ] || [ "$rocm_version" = "latest" ]; then
          echo "Auto-detecting latest ROCm version for target: gfx1151"
          s3_response=$(curl -s "https://therock-nightly-tarball.s3.amazonaws.com/?prefix=therock-dist-linux-gfx1151-7")

          files=$(echo "$s3_response" | grep -oP '(?<=<Key>)[^<]*' | grep "therock-dist-linux-gfx1151-")

          latest_file=""
          latest_major=0
          latest_minor=0
          latest_patch=0
          latest_rc=0
          latest_is_alpha=false

          while IFS= read -r file; do
            if [[ "$file" =~ therock-dist-linux-gfx1151-.*?([0-9]+\.[0-9]+\.[0-9]+(a|rc)[0-9]+)\.tar\.gz ]]; then
              version="${BASH_REMATCH[1]}"
              major=$(echo "$version" | cut -d. -f1)
              minor=$(echo "$version" | cut -d. -f2)
              patch=$(echo "$version" | cut -d. -f3 | sed 's/\(a\|rc\).*//')
              rc=$(echo "$version" | sed 's/.*\(a\|rc\)//')
              is_alpha=false
              [[ "$version" =~ a ]] && is_alpha=true

              is_newer=false
              if [ "$major" -gt "$latest_major" ]; then
                is_newer=true
              elif [ "$major" -eq "$latest_major" ] && [ "$minor" -gt "$latest_minor" ]; then
                is_newer=true
              elif [ "$major" -eq "$latest_major" ] && [ "$minor" -eq "$latest_minor" ] && [ "$patch" -gt "$latest_patch" ]; then
                is_newer=true
              elif [ "$major" -eq "$latest_major" ] && [ "$minor" -eq "$latest_minor" ] && [ "$patch" -eq "$latest_patch" ] && [ "$is_alpha" = true ] && [ "$latest_is_alpha" = false ]; then
                is_newer=true
              elif [ "$is_alpha" = "$latest_is_alpha" ] && [ "$rc" -gt "$latest_rc" ]; then
                is_newer=true
              fi

              if [ "$is_newer" = true ]; then
                latest_file="$file"
                latest_major="$major"; latest_minor="$minor"; latest_patch="$patch"
                latest_rc="$rc"; latest_is_alpha="$is_alpha"
              fi
            fi
          done <<< "$files"

          echo "Found latest file: $latest_file"

          if [[ "$latest_file" =~ therock-dist-linux-gfx1151-.*?([0-9]+\.[0-9]+\.[0-9]+(a|rc)[0-9]+)\.tar\.gz ]]; then
            rocm_version="${BASH_REMATCH[1]}"
            echo "Detected latest ROCm version: $rocm_version"
          else
            echo "Failed to extract ROCm version from: $latest_file"
            exit 1
          fi

          rocm_url="https://therock-nightly-tarball.s3.amazonaws.com/$latest_file"
        else
          rocm_url="https://therock-nightly-tarball.s3.amazonaws.com/therock-dist-linux-gfx1151-${rocm_version}.tar.gz"
        fi

        echo "DETECTED_ROCM_VERSION=$rocm_version" >> $GITHUB_ENV
        echo "Streaming ROCm from: $rocm_url"

        sudo mkdir -p /opt/rocm
        curl -sL "$rocm_url" | sudo tar --use-compress-program=gzip -xf - -C /opt/rocm --strip-components=1

    - name: Set ROCm environment variables
      run: |
        echo "HIP_PATH=/opt/rocm" >> $GITHUB_ENV
        echo "ROCM_PATH=/opt/rocm" >> $GITHUB_ENV
        echo "HIP_PLATFORM=amd" >> $GITHUB_ENV
        echo "HIP_CLANG_PATH=/opt/rocm/llvm/bin" >> $GITHUB_ENV
        echo "/opt/rocm/bin:/opt/rocm/llvm/bin:$PATH" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=/opt/rocm/lib:/opt/rocm/lib64:/opt/rocm/llvm/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
        echo "CPATH=/opt/rocm/include:${CPATH:-}" >> $GITHUB_ENV

    - name: Resolve llama.cpp version
      run: |
        input="${{ github.event.inputs.llamacpp_version }}"

        if [ -z "$input" ] || [ "$input" = "latest" ]; then
          echo "Using default: latest (master branch)"
          echo "LLAMACPP_VERSION=latest" >> $GITHUB_ENV
        elif [[ "$input" =~ ^[0-9]+$ ]]; then
          # Plain number → PR number
          echo "PR number provided: $input"
          echo "Generating ref: refs/pull/$input/head"
          echo "LLAMACPP_VERSION=refs/pull/$input/head" >> $GITHUB_ENV
        elif [[ "$input" == refs/pull/* ]]; then
          # Already a full PR ref
          echo "Using PR ref: $input"
          echo "LLAMACPP_VERSION=$input" >> $GITHUB_ENV
        else
          # Tag, branch, or commit hash
          echo "Using user-specified version: $input"
          echo "LLAMACPP_VERSION=$input" >> $GITHUB_ENV
        fi

    - name: Clone llama.cpp
      run: |
        llamacpp_version="${{ env.LLAMACPP_VERSION }}"

        if [ "$llamacpp_version" = "latest" ]; then
          echo "Cloning master branch (latest) with shallow clone"
          git clone --depth 1 --single-branch --branch master https://github.com/ggml-org/llama.cpp.git
        elif [[ "$llamacpp_version" == refs/pull/* ]]; then
          # Handle PR refs like refs/pull/22673/head
          echo "Cloning PR ref: $llamacpp_version"
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git
          cd llama.cpp
          git fetch --depth 1 origin "$llamacpp_version"
          git FETCH_HEAD
        else
          echo "Cloning llama.cpp version: $llamacpp_version with shallow clone"
          git clone --depth 1 --single-branch --branch "$llamacpp_version" https://github.com/ggml-org/llama.cpp.git
        fi

        cd llama.cpp

        commit_hash=$(git rev-parse --short=5 HEAD)
        echo "LLAMACPP_COMMIT_HASH=$commit_hash" >> $GITHUB_ENV
        echo "llama.cpp commit hash: $commit_hash"
        echo "Current commit:"
        git log --oneline -1

    - name: Build Llama.cpp + ROCm (gfx1151)
      run: |
        cd llama.cpp
        mkdir build
        cd build

        cmake .. -G Ninja \
          -DCMAKE_C_COMPILER=/opt/rocm/llvm/bin/clang \
          -DCMAKE_CXX_COMPILER=/opt/rocm/llvm/bin/clang++ \
          -DCMAKE_CXX_FLAGS="-I/opt/rocm/include" \
          -DCMAKE_CROSSCOMPILING=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DGPU_TARGETS="gfx1151" \
          -DBUILD_SHARED_LIBS=ON \
          -DLLAMA_BUILD_TESTS=OFF \
          -DGGML_HIP=ON \
          -DGGML_OPENMP=OFF \
          -DGGML_CUDA_FORCE_CUBLAS=OFF \
          -DGGML_RPC=ON \
          -DGGML_HIP_ROCWMMA_FATTN=OFF \
          -DLLAMA_BUILD_BORINGSSL=ON \
          -DGGML_NATIVE=OFF \
          -DGGML_STATIC=OFF \
          -DCMAKE_SYSTEM_NAME=Linux

        cmake --build . -j $(nproc)

    - name: Copy ROCm core libs to build directory
      run: |
        build_bin_path="llama.cpp/build/bin"

        # Copy rocblas/library and hipblaslt/library
        for lib_dir in rocblas/library hipblaslt/library; do
          src="/opt/rocm/lib/$lib_dir"
          dst="$build_bin_path/$lib_dir"
          if [ -d "$src" ]; then
            mkdir -p "$(dirname "$dst")"
            cp -r "$src" "$(dirname "$dst/")"
            echo "Copied: $lib_dir"
          fi
        done

        # Copy required ROCm shared libraries
        for lib in \
          libhipblas.so* librocblas.so* libamdhip64.so* librocsolver.so* \
          libroctx64.so* libhipblaslt.so* \
          librocm_sysdeps_liblzma.so* librocprofiler-register.so* \
          libamd_comgr.so* libamd_comgr_loader.so* libhsa-runtime64.so* \
          librocm_sysdeps_numa.so* librocroller.so* librocm_kpack.so* \
          librocm_sysdeps_z.so* librocm_sysdeps_zstd.so* \
          libLLVM.so* libclang-cpp.so* \
          librocm_sysdeps_elf.so* librocm_sysdeps_drm.so* \
          librocm_sysdeps_drm_amdgpu.so* librocm_sysdeps_bz2.so*
        do
          cp -v /opt/rocm/lib/$lib "$build_bin_path/" 2>/dev/null || \
          cp -v /opt/rocm/lib/rocm_sysdeps/lib/$lib "$build_bin_path/" 2>/dev/null || \
          cp -v /opt/rocm/lib/llvm/lib/$lib "$build_bin_path/" 2>/dev/null || \
          echo "Not found: $lib"
        done

        echo "Finished copying ROCm libraries"

    - name: Set RPATH for portable distribution
      run: |
        sudo apt-get install -y patchelf
        cd llama.cpp/build/bin
        for file in *.so* llama-*; do
          [ -f "$file" ] && [ ! -L "$file" ] && patchelf --set-rpath '$ORIGIN' "$file" 2>/dev/null || true
        done

    - name: List build artifacts
      run: |
        cd llama.cpp/build/bin
        echo "Build artifacts:"
        ls -la

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: llama-ubuntu-rocm-gfx1151-x64
        path: llama.cpp/build/bin/
        retention-days: 30

    - name: Set job outputs
      id: set-outputs
      run: |
        rocm_version="${DETECTED_ROCM_VERSION:-${{ env.ROCM_VERSION}}}"
        echo "rocm_version=$rocm_version" >> $GITHUB_OUTPUT
        echo "llamacpp_commit_hash=${LLAMACPP_COMMIT_HASH}" >> $GITHUB_OUTPUT

    - name: Clean up
      if: always()
      run: |
        [ -f "rocm.tar.gz" ] && rm -f rocm.tar.gz || true
        [ -d "/opt/rocm" ] && sudo rm -rf /opt/rocm || true
        [ -d "llama.cpp" ] && rm -rf llama.cpp || true
